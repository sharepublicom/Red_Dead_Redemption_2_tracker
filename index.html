<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نظام متابعة الكهرباء</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--s1:#161b22;--s2:#21262d;--bd:#30363d;
  --tx:#e6edf3;--mt:#8b949e;
  --c1:#58a6ff;--c2:#bc8cff;--c3:#3fb950;
  --rd:#f85149;--gn:#3fb950;--yw:#d29922;
}
body{font-family:'Segoe UI',Tahoma,Arial,sans-serif;background:var(--bg);color:var(--tx);min-height:100vh}
button{cursor:pointer;font-family:inherit}

.hdr{background:var(--s1);border-bottom:1px solid var(--bd);padding:0 1.5rem;position:sticky;top:0;z-index:100}
.hdr-top{display:flex;align-items:center;justify-content:space-between;padding:1rem 0}
.logo{font-size:1.2rem;font-weight:700;display:flex;align-items:center;gap:.6rem}
.logo-icon{font-size:1.5rem}
.logo-text{background:linear-gradient(135deg,var(--c1),var(--c2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.btn-add{background:var(--c1);color:#0d1117;border:none;padding:.5rem 1.25rem;border-radius:.5rem;font-weight:700;font-size:.875rem;transition:opacity .2s}
.btn-add:hover{opacity:.85}
.tabs{display:flex;gap:0;overflow-x:auto}
.tab{padding:.7rem 1.1rem;background:none;border:none;color:var(--mt);font-size:.85rem;border-bottom:2px solid transparent;white-space:nowrap;transition:all .2s}
.tab.active{color:var(--tx);border-bottom-color:var(--c1)}
.tab:hover:not(.active){color:var(--tx)}

main{padding:1.5rem;max-width:1400px;margin:0 auto}
.view{display:none}.view.active{display:block}

.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:.75rem;margin-bottom:1.5rem}
.stat{background:var(--s1);border:1px solid var(--bd);border-radius:.5rem;padding:1rem;text-align:center}
.stat-val{font-size:1.5rem;font-weight:700}
.stat-lbl{font-size:.72rem;color:var(--mt);margin-top:.2rem}

.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:1rem;margin-bottom:1.5rem}
.card{background:var(--s1);border:1px solid var(--bd);border-radius:.75rem;padding:1.25rem}
.card.f1{border-top:3px solid var(--c1)}.card.f2{border-top:3px solid var(--c2)}.card.f3{border-top:3px solid var(--c3)}
.card-lbl{font-size:.75rem;color:var(--mt);text-transform:uppercase;letter-spacing:.04em;margin-bottom:.6rem}
.card-val{font-size:2rem;font-weight:700}
.card-sub{font-size:.78rem;color:var(--mt);margin-top:.2rem}
.card-grid{display:grid;grid-template-columns:1fr 1fr;gap:.6rem;margin-top:1rem}
.cg-lbl{font-size:.72rem;color:var(--mt)}
.cg-val{font-weight:600;font-size:.95rem}

.panel{background:var(--s1);border:1px solid var(--bd);border-radius:.75rem;overflow:hidden;margin-bottom:1.5rem}
.panel-hdr{padding:1rem 1.25rem;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--bd)}
.panel-title{font-weight:700;font-size:.95rem}
.panel-meta{font-size:.78rem;color:var(--mt)}
.tscroll{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:.83rem}
thead{background:var(--s2)}
th{padding:.7rem .9rem;text-align:right;color:var(--mt);font-weight:600;white-space:nowrap;border-bottom:1px solid var(--bd)}
td{padding:.6rem .9rem;border-bottom:1px solid var(--bd);white-space:nowrap}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover td{background:rgba(255,255,255,.02)}
.cf1{color:var(--c1)}.cf2{color:var(--c2)}.cf3{color:var(--c3)}
.num{font-variant-numeric:tabular-nums}
.badge{display:inline-block;padding:.15rem .55rem;border-radius:999px;font-size:.75rem;font-weight:600}
.b-up{background:rgba(63,185,80,.15);color:var(--gn)}
.b-zero{background:rgba(139,148,158,.1);color:var(--mt)}
.b-down{background:rgba(248,81,73,.12);color:var(--rd)}
.actions{display:flex;gap:.4rem}
.btn-xs{padding:.25rem .65rem;border-radius:.3rem;border:1px solid var(--bd);background:none;color:var(--mt);font-size:.75rem;transition:all .15s}
.btn-xs:hover{color:var(--tx);background:var(--s2)}
.btn-del:hover{color:var(--rd);border-color:var(--rd)}

.mini-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:.75rem;margin-bottom:1.5rem}
.mc{background:var(--s1);border:1px solid var(--bd);border-radius:.5rem;padding:1rem}
.mc-lbl{font-size:.72rem;color:var(--mt);margin-bottom:.3rem}
.mc-val{font-size:1.35rem;font-weight:700}

.chart-wrap{background:var(--s1);border:1px solid var(--bd);border-radius:.75rem;padding:1.25rem;margin-bottom:1.5rem}
.chart-title{font-weight:700;font-size:.9rem;margin-bottom:1rem;color:var(--mt)}
.chart-scroll{overflow-x:auto;padding-bottom:.5rem}
canvas{display:block}

.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:300;align-items:center;justify-content:center}
.overlay.open{display:flex}
.modal{background:var(--s1);border:1px solid var(--bd);border-radius:.75rem;padding:1.5rem;width:min(560px,calc(100vw - 2rem));max-height:calc(100vh - 2rem);overflow-y:auto}
.modal-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem}
.modal-hdr h2{font-size:1.05rem;font-weight:700}
.btn-close{background:none;border:none;color:var(--mt);font-size:1.6rem;line-height:1;cursor:pointer}
.btn-close:hover{color:var(--tx)}
.fg{display:flex;flex-direction:column;gap:1rem}
.fg label{display:block;font-size:.78rem;color:var(--mt);margin-bottom:.35rem}
.fg input{width:100%;background:var(--s2);border:1px solid var(--bd);border-radius:.45rem;padding:.55rem .85rem;color:var(--tx);font-size:.9rem;font-family:inherit;transition:border-color .15s}
.fg input:focus{outline:none;border-color:var(--c1)}
.sec-hdr{border-top:1px solid var(--bd);padding-top:1rem;margin-top:.25rem}
.sec-lbl{font-size:.75rem;font-weight:700;color:var(--mt);text-transform:uppercase;letter-spacing:.05em;margin-bottom:.75rem}
.frow{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.7rem}
.modal-foot{display:flex;gap:.75rem;margin-top:1.5rem;padding-top:1rem;border-top:1px solid var(--bd)}
.btn-cancel{background:none;border:1px solid var(--bd);border-radius:.45rem;padding:.55rem 1.2rem;color:var(--mt);transition:all .15s}
.btn-cancel:hover{color:var(--tx);background:var(--s2)}
.btn-save{background:var(--c1);border:none;border-radius:.45rem;padding:.55rem 1.5rem;color:#0d1117;font-weight:700;transition:opacity .15s}
.btn-save:hover{opacity:.85}

.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:#238636;color:#fff;padding:.65rem 1.5rem;border-radius:.5rem;font-size:.875rem;font-weight:600;z-index:400;opacity:0;pointer-events:none;transition:opacity .25s}
.toast.show{opacity:1}

@media(max-width:640px){
  main{padding:1rem}
  .frow{grid-template-columns:1fr}
  .cards,.mini-cards{grid-template-columns:1fr}
}
</style>
</head>
<body>

<header class="hdr">
  <div class="hdr-top">
    <div class="logo">
      <span class="logo-icon">⚡</span>
      <span class="logo-text">نظام متابعة الكهرباء</span>
    </div>
    <button class="btn-add" onclick="openModal()">+ إضافة قراءة</button>
  </div>
  <nav class="tabs">
    <button class="tab active" onclick="showView('dash',this)">📊 لوحة التحكم</button>
    <button class="tab" onclick="showView('all',this)">📋 جميع السجلات</button>
    <button class="tab" onclick="showView('f0',this)">🏠 الشقة ١</button>
    <button class="tab" onclick="showView('f1',this)">🏠 الشقة ٢</button>
    <button class="tab" onclick="showView('f2',this)">🏠 الشقة ٣</button>
  </nav>
</header>

<main>
  <div id="view-dash" class="view active">
    <div id="dash-stats" class="stats"></div>
    <div id="dash-cards" class="cards"></div>
    <div class="panel">
      <div class="panel-hdr"><div class="panel-title">آخر ١٠ سجلات</div></div>
      <div class="tscroll"><table id="tbl-recent"></table></div>
    </div>
  </div>

  <div id="view-all" class="view">
    <div class="panel">
      <div class="panel-hdr">
        <div class="panel-title">جميع السجلات</div>
        <div id="rec-count" class="panel-meta"></div>
      </div>
      <div class="tscroll"><table id="tbl-all"></table></div>
    </div>
  </div>

  <div id="view-f0" class="view">
    <div id="mini-f0" class="mini-cards"></div>
    <div class="chart-wrap">
      <div class="chart-title">الاستهلاك لكل فترة — الشقة ١</div>
      <div class="chart-scroll"><canvas id="ch-f0" height="200"></canvas></div>
    </div>
    <div class="panel"><div class="panel-hdr"><div class="panel-title">سجل الشقة ١</div></div><div class="tscroll"><table id="tbl-f0"></table></div></div>
  </div>

  <div id="view-f1" class="view">
    <div id="mini-f1" class="mini-cards"></div>
    <div class="chart-wrap">
      <div class="chart-title">الاستهلاك لكل فترة — الشقة ٢</div>
      <div class="chart-scroll"><canvas id="ch-f1" height="200"></canvas></div>
    </div>
    <div class="panel"><div class="panel-hdr"><div class="panel-title">سجل الشقة ٢</div></div><div class="tscroll"><table id="tbl-f1"></table></div></div>
  </div>

  <div id="view-f2" class="view">
    <div id="mini-f2" class="mini-cards"></div>
    <div class="chart-wrap">
      <div class="chart-title">الاستهلاك لكل فترة — الشقة ٣</div>
      <div class="chart-scroll"><canvas id="ch-f2" height="200"></canvas></div>
    </div>
    <div class="panel"><div class="panel-hdr"><div class="panel-title">سجل الشقة ٣</div></div><div class="tscroll"><table id="tbl-f2"></table></div></div>
  </div>
</main>

<div class="overlay" id="overlay" onclick="overlayClick(event)">
  <div class="modal">
    <div class="modal-hdr">
      <h2 id="modal-title">إضافة قراءة جديدة</h2>
      <button class="btn-close" onclick="closeModal()">×</button>
    </div>
    <form id="entry-form" onsubmit="submitForm(event)">
      <div class="fg">
        <div>
          <label>التاريخ</label>
          <input type="date" id="f-date" required>
        </div>
        <div class="sec-hdr">
          <div class="sec-lbl">قراءات العداد (كيلوواط/ساعة)</div>
          <div class="frow">
            <div><label style="color:var(--c1)">الشقة ١</label><input type="number" id="f-r0" min="0" step="1" placeholder="0"></div>
            <div><label style="color:var(--c2)">الشقة ٢</label><input type="number" id="f-r1" min="0" step="1" placeholder="0"></div>
            <div><label style="color:var(--c3)">الشقة ٣</label><input type="number" id="f-r2" min="0" step="1" placeholder="0"></div>
          </div>
        </div>
        <div class="sec-hdr">
          <div class="sec-lbl">المبالغ المدفوعة (ر.ع)</div>
          <div class="frow">
            <div><label style="color:var(--c1)">الشقة ١</label><input type="number" id="f-p0" min="0" step="0.001" placeholder="0.000"></div>
            <div><label style="color:var(--c2)">الشقة ٢</label><input type="number" id="f-p1" min="0" step="0.001" placeholder="0.000"></div>
            <div><label style="color:var(--c3)">الشقة ٣</label><input type="number" id="f-p2" min="0" step="0.001" placeholder="0.000"></div>
          </div>
        </div>
      </div>
      <div class="modal-foot">
        <button type="submit" class="btn-save">حفظ</button>
        <button type="button" class="btn-cancel" onclick="closeModal()">إلغاء</button>
      </div>
    </form>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SEED = [
  {id:'r01',date:'2024-02-11',r:[0,0,0],p:[null,null,null]},
  {id:'r02',date:'2024-03-31',r:[24,63,1],p:[0.336,0.882,0.014]},
  {id:'r03',date:'2024-03-31',r:[105,636,44],p:[1.134,8.022,0.602]},
  {id:'r04',date:'2024-04-27',r:[134,1026,166],p:[0.406,5.46,1.708]},
  {id:'r05',date:'2024-05-24',r:[1103,1651,241],p:[13.566,8.75,1.05]},
  {id:'r06',date:'2024-05-30',r:[1103,1651,241],p:[0,0,0]},
  {id:'r07',date:'2024-06-28',r:[2889,2406,241],p:[25.004,10.57,0]},
  {id:'r08',date:'2024-07-02',r:[2889,2406,241],p:[0,0,0]},
  {id:'r09',date:'2024-07-04',r:[2889,2406,267],p:[0,0,0.364]},
  {id:'r10',date:'2024-07-26',r:[4621,3294,810],p:[24.248,12.432,7.602]},
  {id:'r11',date:'2024-08-31',r:[5312,4072,1651],p:[9.674,10.892,11.774]},
  {id:'r12',date:'2024-09-26',r:[6157,4840,2175],p:[11.83,10.752,7.336]},
  {id:'r13',date:'2024-10-26',r:[6841,5171,2552],p:[9.576,4.634,5.278]},
  {id:'r14',date:'2024-11-29',r:[7415,5689,2761],p:[8.036,7.252,2.926]},
  {id:'r15',date:'2024-12-27',r:[7416,6014,2935],p:[0.014,4.55,2.436]},
  {id:'r16',date:'2025-01-26',r:[7498,6109,3076],p:[1.148,1.33,1.974]},
  {id:'r17',date:'2025-02-28',r:[7636,6420,3230],p:[1.932,4.354,2.156]},
  {id:'r18',date:'2025-03-28',r:[7817,6747,3362],p:[2.534,4.578,1.848]},
  {id:'r19',date:'2025-04-28',r:[8322,7253,3660],p:[7.07,7.084,4.172]},
  {id:'r20',date:'2025-05-30',r:[9626,7725,4194],p:[18.256,6.608,7.476]},
  {id:'r21',date:'2025-06-30',r:[9710,7850,4814],p:[1.176,1.75,8.68]},
  {id:'r22',date:'2025-07-31',r:[10340,8182,5522],p:[8.82,4.648,9.912]},
  {id:'r23',date:'2025-08-30',r:[10911,8845,6147],p:[7.994,9.282,8.75]},
  {id:'r24',date:'2025-10-01',r:[11400,9177,6743],p:[6.846,4.648,8.344]},
  {id:'r25',date:'2025-11-01',r:[11737,10686,7213],p:[4.718,21.126,6.58]},
  {id:'r26',date:'2025-12-01',r:[11930,11479,7444],p:[2.702,11.102,3.234]},
  {id:'r27',date:'2025-12-31',r:[12053,11946,7624],p:[1.722,6.538,2.52]},
  {id:'r28',date:'2026-01-28',r:[12147,12275,7783],p:[1.316,4.606,2.226]},
  {id:'r29',date:'2026-02-28',r:[12263,12707,7978],p:[1.624,6.048,2.73]},
  {id:'r30',date:'2026-03-31',r:[12453,13352,8283],p:[2.66,9.03,4.27]},
  {id:'r31',date:'2026-04-30',r:[12796,14551,8718],p:[4.802,16.786,6.09]},
  {id:'r32',date:'2026-05-29',r:[13273,16308,9272],p:[6.678,24.598,7.756]},
];

const FLATS  = ['الشقة ١','الشقة ٢','الشقة ٣'];
const COLORS = ['#58a6ff','#bc8cff','#3fb950'];
const LS = 'elec-v2';

let db = [], editId = null;

function load() {
  try { const s = localStorage.getItem(LS); db = s ? JSON.parse(s) : clone(); }
  catch { db = clone(); }
  db.sort((a,b) => a.date < b.date ? -1 : a.date > b.date ? 1 : 0);
}
function clone() { return SEED.map(d => ({...d,r:[...d.r],p:[...d.p]})); }
function persist() { localStorage.setItem(LS, JSON.stringify(db)); }
function uid() { return 'x'+Date.now()+Math.random().toString(36).slice(2,6); }

function fd(d) { const [y,m,n]=d.split('-'); return n+'/'+m+'/'+y; }
function fp(v) { return v==null ? '—' : (+v).toFixed(3)+' ر.ع'; }
function fn0(v) { return v==null ? '—' : (+v).toFixed(0); }

function cons(idx, fi) { return idx>0 ? db[idx].r[fi]-db[idx-1].r[fi] : null; }
function totalPaid(fi) { return db.reduce((s,r)=>s+(r.p[fi]||0),0); }
function totalCons(fi) { return db.length<2?0:db[db.length-1].r[fi]-db[0].r[fi]; }

function badge(v) {
  if (v==null) return '<span class="badge b-zero">—</span>';
  if (v>0)  return `<span class="badge b-up">+${(+v).toFixed(0)}</span>`;
  if (v<0)  return `<span class="badge b-down">${(+v).toFixed(0)}</span>`;
  return '<span class="badge b-zero">0</span>';
}

function thead(actions) {
  return `<thead><tr>
    <th>#</th><th>التاريخ</th>
    <th class="cf1">قراءة ١</th><th class="cf2">قراءة ٢</th><th class="cf3">قراءة ٣</th>
    <th>استهلاك ١</th><th>استهلاك ٢</th><th>استهلاك ٣</th>
    <th class="cf1">دفع ١</th><th class="cf2">دفع ٢</th><th class="cf3">دفع ٣</th>
    ${actions?'<th></th>':''}
  </tr></thead>`;
}

function trow(row, idx, actions) {
  return `<tr>
    <td style="color:var(--mt);font-size:.77rem">${idx+1}</td>
    <td>${fd(row.date)}</td>
    <td class="cf1 num">${fn0(row.r[0])}</td>
    <td class="cf2 num">${fn0(row.r[1])}</td>
    <td class="cf3 num">${fn0(row.r[2])}</td>
    <td>${badge(cons(idx,0))}</td>
    <td>${badge(cons(idx,1))}</td>
    <td>${badge(cons(idx,2))}</td>
    <td class="cf1 num">${fp(row.p[0])}</td>
    <td class="cf2 num">${fp(row.p[1])}</td>
    <td class="cf3 num">${fp(row.p[2])}</td>
    ${actions?`<td><div class="actions">
      <button class="btn-xs" onclick="openModal('${row.id}')">✏️</button>
      <button class="btn-xs btn-del" onclick="del('${row.id}')">🗑️</button>
    </div></td>`:''}
  </tr>`;
}

function renderDash() {
  const last=db[db.length-1], prev=db.length>1?db[db.length-2]:null;
  const sum=(totalPaid(0)+totalPaid(1)+totalPaid(2)).toFixed(3);
  document.getElementById('dash-stats').innerHTML=`
    <div class="stat"><div class="stat-val" style="color:var(--c1)">${db.length}</div><div class="stat-lbl">إجمالي السجلات</div></div>
    <div class="stat"><div class="stat-val" style="color:var(--c2)">${fd(db[0].date)}</div><div class="stat-lbl">تاريخ البداية</div></div>
    <div class="stat"><div class="stat-val" style="color:var(--c3)">${fd(last.date)}</div><div class="stat-lbl">آخر قراءة</div></div>
    <div class="stat"><div class="stat-val" style="color:var(--yw)">${sum}</div><div class="stat-lbl">إجمالي المدفوعات (ر.ع)</div></div>
  `;
  document.getElementById('dash-cards').innerHTML=[0,1,2].map(fi=>`
    <div class="card f${fi+1}">
      <div class="card-lbl">${FLATS[fi]}</div>
      <div class="card-val" style="color:${COLORS[fi]}">${fn0(last.r[fi])}</div>
      <div class="card-sub">القراءة الحالية (كيلوواط/ساعة)</div>
      <div class="card-grid">
        <div><div class="cg-lbl">آخر استهلاك</div><div class="cg-val">${prev?fn0(last.r[fi]-prev.r[fi])+' وحدة':'—'}</div></div>
        <div><div class="cg-lbl">آخر دفعة</div><div class="cg-val">${fp(last.p[fi])}</div></div>
        <div><div class="cg-lbl">الاستهلاك الكلي</div><div class="cg-val">${fn0(totalCons(fi))} وحدة</div></div>
        <div><div class="cg-lbl">إجمالي المدفوع</div><div class="cg-val">${totalPaid(fi).toFixed(3)} ر.ع</div></div>
      </div>
    </div>
  `).join('');
  const recent=[...db].reverse().slice(0,10);
  document.getElementById('tbl-recent').innerHTML=
    thead(false)+'<tbody>'+recent.map(r=>trow(r,db.indexOf(r),false)).join('')+'</tbody>';
}

function renderAll() {
  document.getElementById('rec-count').textContent=db.length+' سجل';
  document.getElementById('tbl-all').innerHTML=
    thead(true)+'<tbody>'+db.map((r,i)=>trow(r,i,true)).join('')+'</tbody>';
}

function renderFlat(fi) {
  const last=db[db.length-1], prev=db.length>1?db[db.length-2]:null;
  document.getElementById('mini-f'+fi).innerHTML=`
    <div class="mc"><div class="mc-lbl">القراءة الحالية</div><div class="mc-val" style="color:${COLORS[fi]}">${fn0(last.r[fi])}</div></div>
    <div class="mc"><div class="mc-lbl">الاستهلاك الكلي</div><div class="mc-val">${fn0(totalCons(fi))} وحدة</div></div>
    <div class="mc"><div class="mc-lbl">إجمالي المدفوع</div><div class="mc-val">${totalPaid(fi).toFixed(3)} ر.ع</div></div>
    <div class="mc"><div class="mc-lbl">آخر استهلاك</div><div class="mc-val">${prev?fn0(last.r[fi]-prev.r[fi])+' وحدة':'—'}</div></div>
    <div class="mc"><div class="mc-lbl">آخر دفعة</div><div class="mc-val">${fp(last.p[fi])}</div></div>
  `;
  const th=`<thead><tr><th>#</th><th>التاريخ</th><th style="color:${COLORS[fi]}">القراءة</th><th>الاستهلاك</th><th style="color:${COLORS[fi]}">المدفوع</th></tr></thead>`;
  const tb=db.map((r,i)=>`<tr>
    <td style="color:var(--mt);font-size:.77rem">${i+1}</td>
    <td>${fd(r.date)}</td>
    <td class="num" style="color:${COLORS[fi]}">${fn0(r.r[fi])}</td>
    <td>${i>0?badge(r.r[fi]-db[i-1].r[fi]):'—'}</td>
    <td class="num">${fp(r.p[fi])}</td>
  </tr>`).join('');
  document.getElementById('tbl-f'+fi).innerHTML=th+'<tbody>'+tb+'</tbody>';
  drawChart(fi);
}

function drawChart(fi) {
  const canvas=document.getElementById('ch-f'+fi);
  if(!canvas) return;
  const pts=[];
  for(let i=1;i<db.length;i++) pts.push({lbl:fd(db[i].date).slice(0,5),v:db[i].r[fi]-db[i-1].r[fi]});
  const bw=30,gap=6,pH=200,lH=28,pTop=24;
  const W=Math.max(640,pts.length*(bw+gap)+20);
  canvas.width=W; canvas.height=pH+lH;
  const ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,W,pH+lH);
  const maxV=Math.max(...pts.map(p=>p.v),1);
  const color=COLORS[fi];
  const steps=4;
  ctx.strokeStyle='#21262d'; ctx.lineWidth=1;
  for(let s=1;s<=steps;s++){
    const y=pH-(s/steps)*(pH-pTop);
    ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke();
    ctx.fillStyle='#8b949e'; ctx.font='9px sans-serif'; ctx.textAlign='right';
    ctx.fillText(Math.round((s/steps)*maxV),W-2,y-2);
  }
  pts.forEach((pt,i)=>{
    const x=i*(bw+gap);
    const bh=Math.max(1,(pt.v/maxV)*(pH-pTop));
    const y=pH-bh;
    ctx.fillStyle=color+'bb';
    ctx.fillRect(x,y,bw,bh);
    if(bh>16){
      ctx.fillStyle=color; ctx.font='bold 9px sans-serif'; ctx.textAlign='center';
      ctx.fillText(pt.v>=1000?(pt.v/1000).toFixed(1)+'k':pt.v,x+bw/2,y-3);
    }
    ctx.fillStyle='#8b949e'; ctx.font='9px sans-serif'; ctx.textAlign='center';
    ctx.fillText(pt.lbl,x+bw/2,pH+18);
  });
  ctx.strokeStyle='#30363d'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(0,pH); ctx.lineTo(W,pH); ctx.stroke();
}

function showView(id, btn) {
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('view-'+id).classList.add('active');
  btn.classList.add('active');
  if(id.startsWith('f')) setTimeout(()=>drawChart(parseInt(id[1])),20);
}

function openModal(id) {
  editId=id||null;
  document.getElementById('modal-title').textContent=id?'تعديل السجل':'إضافة قراءة جديدة';
  if(id){
    const row=db.find(r=>r.id===id); if(!row) return;
    document.getElementById('f-date').value=row.date;
    [0,1,2].forEach(i=>{
      document.getElementById('f-r'+i).value=row.r[i]??'';
      document.getElementById('f-p'+i).value=row.p[i]??'';
    });
  } else {
    document.getElementById('entry-form').reset();
    document.getElementById('f-date').value=new Date().toISOString().slice(0,10);
  }
  document.getElementById('overlay').classList.add('open');
}

function closeModal() { document.getElementById('overlay').classList.remove('open'); editId=null; }
function overlayClick(e) { if(e.target===e.currentTarget) closeModal(); }

function submitForm(e) {
  e.preventDefault();
  const date=document.getElementById('f-date').value; if(!date) return;
  const r=[0,1,2].map(i=>{const v=document.getElementById('f-r'+i).value;return v===''?0:parseFloat(v);});
  const p=[0,1,2].map(i=>{const v=document.getElementById('f-p'+i).value;return v===''?null:parseFloat(v);});
  if(editId){
    const idx=db.findIndex(d=>d.id===editId);
    if(idx>=0) db[idx]={...db[idx],date,r,p};
  } else {
    db.push({id:uid(),date,r,p});
    db.sort((a,b)=>a.date<b.date?-1:a.date>b.date?1:0);
  }
  persist(); renderViews(); closeModal(); showToast('تم الحفظ بنجاح ✓');
}

function del(id) {
  if(!confirm('هل تريد حذف هذا السجل؟')) return;
  db=db.filter(d=>d.id!==id);
  persist(); renderViews(); showToast('تم الحذف');
}

function showToast(msg) {
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2500);
}

function renderViews() {
  renderDash(); renderAll(); [0,1,2].forEach(renderFlat);
}

load(); renderViews();
</script>
